name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  review:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Run Claude code review
        if: ${{ secrets.ANTHROPIC_API_KEY != '' }}
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            Review this pull request against our team checklist.

            Focus on changed code only unless broader repo context is needed.
            This is a Django/Python application using uv, Ruff, djLint, and Bandit.

            ## Code Quality
            - [ ] Code follows our style guide
            - [ ] No commented-out code
            - [ ] Meaningful variable names
            - [ ] DRY principle followed

            Also review for:
            - Clean code principles and best practices
            - Proper error handling and edge cases
            - Code readability and maintainability
            - Potential bugs or issues
            - Possible N plus one queries, repeated ORM queries, or missing select_related/prefetch_related opportunities

            ## Security
            - Check for potential security vulnerabilities
            - Validate input sanitization
            - Review authentication and authorization logic
            - Call out any security concerns

            ## Performance
            - Identify potential performance bottlenecks
            - Review database queries for efficiency
            - Check for memory leaks or resource issues
            - Call out other performance considerations

            Instructions:
            - Post one summary PR comment with the checklist and key findings.
            - Use inline comments for specific code issues.
            - If there are no meaningful issues in an area, say so briefly.
            - Prioritize actionable feedback over praise.
            - Do not submit the review as plain assistant text; post GitHub comments only.

          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"

      - name: Skip when ANTHROPIC_API_KEY is not configured
        if: ${{ secrets.ANTHROPIC_API_KEY == '' }}
        run: echo "ANTHROPIC_API_KEY is not configured; skipping Claude review."

name: Frontend Checks

on:
  workflow_call:

jobs:
  templates:
    name: Django Templates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "0.10.2"
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Lint Django templates
        # Pin djlint: unpinned `uvx djlint` pulls the latest release at run time,
        # so a new djlint version can change formatting rules and fail CI on
        # untouched templates. 1.39.x reformats 5 existing templates that 1.38.0
        # accepts; bump this deliberately alongside a reformat, not implicitly.
        run: uvx djlint@1.38.0 voice/templates --check

name: Claude Security Review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  security:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      security-events: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Run Claude security review
        if: ${{ secrets.ANTHROPIC_API_KEY != '' }}
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            Perform a comprehensive security review.

            This is a Django/Python application. Pay extra attention to views, webhook handlers,
            auth flows, ORM usage, settings, secrets handling, and any external API integrations.

            ## OWASP Top 10 Analysis
            - SQL Injection vulnerabilities
            - Cross-Site Scripting (XSS)
            - Broken Authentication
            - Sensitive Data Exposure
            - XML External Entities (XXE)
            - Broken Access Control
            - Security Misconfiguration
            - Cross-Site Request Forgery (CSRF)
            - Using Components with Known Vulnerabilities
            - Insufficient Logging and Monitoring

            ## Additional Security Checks
            - Hardcoded secrets or credentials
            - Insecure cryptographic practices
            - Unsafe deserialization
            - Server-Side Request Forgery (SSRF)
            - Race conditions or TOCTOU issues
            - Missing webhook signature validation
            - Unsafe file handling or path traversal risks

            Rate severity as: CRITICAL, HIGH, MEDIUM, LOW, or NONE.

            Instructions:
            - Post detailed findings with recommendations.
            - Post one summary PR comment.
            - Use inline comments for exact lines when appropriate.
            - If you suspect an issue but cannot prove it from the diff alone, clearly label it as a risk to verify.
            - Do not submit the review as plain assistant text; post GitHub comments only.

          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"

      - name: Skip when ANTHROPIC_API_KEY is not configured
        if: ${{ secrets.ANTHROPIC_API_KEY == '' }}
        run: echo "ANTHROPIC_API_KEY is not configured; skipping Claude security review."
